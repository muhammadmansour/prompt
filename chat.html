<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audit Session — WathbaGRC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body class="admin-body">

  <div class="admin-layout">

    <!-- Sidebar -->
    <aside class="admin-sidebar" id="admin-sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-logo">W</div>
        <div class="sidebar-brand-text">
          <span class="sidebar-brand-name">WathbaGRC</span>
          <span class="sidebar-brand-tag">ADMIN</span>
        </div>
      </div>

      <nav class="sidebar-nav">
        <a href="/dashboard" class="sidebar-item" data-page="dashboard" style="text-decoration:none">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="9" y="1" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="1" y="9" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="9" y="9" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/></svg>
          Dashboard
        </a>

        <div class="sidebar-divider"></div>

        <button class="sidebar-section-toggle" data-section="ai-management">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.5"/><path d="M8 5V8L10 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          AI MANAGEMENT
          <svg class="chevron" width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M4 5L6 7L8 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
        <div class="sidebar-section open" id="section-ai-management">
          <a href="/audit-sessions" class="sidebar-item active" data-page="audit-sessions" style="text-decoration:none">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 3H14M2 8H14M2 13H8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            Audit Sessions
          </a>
          <a href="/audit-studio" class="sidebar-item" data-page="audit-studio" style="text-decoration:none">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1V3M8 13V15M3 8H1M15 8H13M4 4L2.5 2.5M13.5 13.5L12 12M4 12L2.5 13.5M13.5 2.5L12 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="8" cy="8" r="3" stroke="currentColor" stroke-width="1.5"/></svg>
            Audit Studio
          </a>
        </div>

        <button class="sidebar-section-toggle" data-section="controls">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 4L8 1L14 4V12L8 15L2 12V4Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          CONTROLS
          <svg class="chevron" width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M4 5L6 7L8 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
        <div class="sidebar-section open" id="section-controls">
          <a href="/controls-studio" class="sidebar-item" data-page="controls-studio" style="text-decoration:none">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 8H6L8 3L10 13L12 8H14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Controls Studio
          </a>
          <a href="/merge-optimizer" class="sidebar-item" data-page="merge-optimizer" style="text-decoration:none">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M12 2V14M4 4V8C4 10.2 5.8 12 8 12H12M4 4L2 6M4 4L6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Merge Optimizer
          </a>
        </div>

        <div class="sidebar-divider"></div>

        <a href="/org-contexts" class="sidebar-item" data-page="org-contexts" style="text-decoration:none">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 13V4C2 3.4 2.4 3 3 3H13C13.6 3 14 3.4 14 4V13M5 7H11M5 10H9M8 3V1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Org Contexts
        </a>
        <a href="/prompts" class="sidebar-item" data-page="prompts" style="text-decoration:none">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 2H13C13.6 2 14 2.4 14 3V13C14 13.6 13.6 14 13 14H3C2.4 14 2 13.6 2 13V3C2 2.4 2.4 2 3 2Z" stroke="currentColor" stroke-width="1.5"/><path d="M5 5H11M5 8H11M5 11H8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          Prompts
        </a>
        <a href="/file-collections" class="sidebar-item" data-page="file-collections" style="text-decoration:none">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 5V12C2 12.6 2.4 13 3 13H13C13.6 13 14 12.6 14 12V7C14 6.4 13.6 6 13 6H8L6.5 4H3C2.4 4 2 4.4 2 5Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          File Collections
        </a>
      </nav>

      <div class="sidebar-footer">
        <button class="sidebar-logout-btn" onclick="adminLogout()">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 12H3C2.4 12 2 11.6 2 11V3C2 2.4 2.4 2 3 2H5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M9 10L12 7L9 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M12 7H5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          Sign Out
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <div class="admin-main">

      <!-- Header -->
      <header class="admin-header">
        <div class="admin-header-left">
          <a href="/audit-sessions" class="chat-header-back" title="Back to Audit Sessions">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8L10 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </a>
          <div class="chat-header-info">
            <span class="chat-header-title" id="chat-header-title">Audit Session</span>
            <span class="chat-header-session-id" id="chat-header-session-id"></span>
          </div>
        </div>
        <div class="admin-header-right">
          <button class="chat-header-btn" type="button" id="btn-upload-file" title="Upload context file">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M12 9V11.5C12 12.1 11.6 12.5 11 12.5H3C2.4 12.5 2 12.1 2 11.5V9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M9.5 4.5L7 2L4.5 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M7 2V9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            Upload File
          </button>
          <span class="admin-header-powered">Powered by <strong>WATHBAH</strong></span>
        </div>
      </header>

      <!-- Chat Content Wrapper -->
      <div class="chat-wrapper">

        <!-- Context Bar -->
        <div class="chat-ctx-bar" id="chat-ctx-bar">
          <div class="chat-ctx-card" onclick="toggleContextExpand('ctx-req-details')" style="cursor:pointer">
            <div class="chat-ctx-icon chat-ctx-icon-blue">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2.5 7L5.5 10L11.5 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
            <div class="chat-ctx-info">
              <div class="chat-ctx-label">
                Requirements
                <svg class="chat-ctx-chevron" width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2.5 4L5 6.5L7.5 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
              </div>
              <div class="chat-ctx-value" id="ctx-req-count">0 selected</div>
            </div>
          </div>
          <div class="chat-ctx-card" onclick="toggleContextExpand('ctx-files-details')" style="cursor:pointer">
            <div class="chat-ctx-icon chat-ctx-icon-emerald">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1.5 4.5V11C1.5 11.8 2.2 12.5 3 12.5H11C11.8 12.5 12.5 11.8 12.5 11V6.5C12.5 5.7 11.8 5 11 5H7L5.75 3.5H3C2.2 3.5 1.5 4.2 1.5 5V4.5Z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
            <div class="chat-ctx-info">
              <div class="chat-ctx-label">
                Reference Files
                <svg class="chat-ctx-chevron" width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2.5 4L5 6.5L7.5 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
              </div>
              <div class="chat-ctx-value" id="ctx-files-count">0 files</div>
            </div>
          </div>
          <div class="chat-ctx-card">
            <div class="chat-ctx-icon chat-ctx-icon-amber">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 2.5H10L12.5 5V11.5C12.5 12.1 12.1 12.5 11.5 12.5H3C2.4 12.5 2 12.1 2 11.5V3C2 2.7 2.3 2.5 2.5 2.5H3Z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M10 2.5V5H12.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
            <div class="chat-ctx-info">
              <div class="chat-ctx-label">Query Context</div>
              <div class="chat-ctx-value" id="ctx-query-summary">No query</div>
            </div>
          </div>
        </div>

        <!-- Expandable Detail Panels -->
        <div class="chat-ctx-panel" id="ctx-req-details" style="display:none">
          <div class="chat-ctx-panel-content" id="ctx-req-list"></div>
        </div>
        <div class="chat-ctx-panel" id="ctx-files-details" style="display:none">
          <div class="chat-ctx-panel-content" id="ctx-files-list"></div>
        </div>

        <!-- Messages Area -->
        <div class="chat-messages-area">
          <div class="chat-messages" id="chat-messages">
            <!-- Messages rendered by JS -->
          </div>
        </div>

        <!-- Input Area -->
        <div class="chat-input-area">
          <div class="chat-input-wrapper">
            <textarea
              id="chat-input"
              class="chat-input"
              placeholder="Ask about compliance, audit findings, or specific requirements..."
              rows="1"
            ></textarea>
            <button type="button" class="chat-send-btn" id="chat-send-btn" disabled>
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                <path d="M16 2L8 10M16 2L11 16L8 10M16 2L2 7L8 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
          <div class="chat-input-hint">Press Enter to send, Shift + Enter for new line</div>
        </div>

      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <script src="chat.js"></script>
</body>
</html>
